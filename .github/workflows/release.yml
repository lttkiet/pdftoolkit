name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.rid }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Install Avalonia dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libfontconfig1 libdbus-1-3 libicu-dev
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Publish
        run: dotnet publish src/PdfToolkit/PdfToolkit.csproj --configuration Release --self-contained --runtime ${{ matrix.rid }} --output publish/${{ matrix.rid }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PdfToolkit-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Package into archives
        run: |
          for dir in release-assets/*/; do
            name=$(basename "$dir")
            (cd release-assets && zip -r "../${name}.zip" "$name")
          done
      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes
          for f in *.zip; do
            echo "Uploading $f..."
            gh release upload "${{ github.ref_name }}" "$f"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
