name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Install Avalonia dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libfontconfig1 libdbus-1-3 libicu-dev
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Publish (Linux)
        if: runner.os == 'Linux'
        run: dotnet publish src/PdfToolkit/PdfToolkit.csproj --configuration Release --self-contained --runtime linux-x64 --output publish/linux-x64
      - name: Publish (Windows)
        if: runner.os == 'Windows'
        run: dotnet publish src/PdfToolkit/PdfToolkit.csproj --configuration Release --self-contained --runtime win-x64 --output publish/win-x64
      - name: Publish (macOS)
        if: runner.os == 'macOS'
        run: dotnet publish src/PdfToolkit/PdfToolkit.csproj --configuration Release --self-contained --runtime osx-x64 --output publish/osx-x64
      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: PdfToolkit-linux-${{ github.sha }}
          path: publish/linux-x64/
          if-no-files-found: error
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: PdfToolkit-windows-${{ github.sha }}
          path: publish/win-x64/
          if-no-files-found: error
      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: PdfToolkit-macos-${{ github.sha }}
          path: publish/osx-x64/
          if-no-files-found: error
