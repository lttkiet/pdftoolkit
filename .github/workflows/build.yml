name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libegl1 \
            libfontconfig1 \
            libdbus-1-3

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "
          from src.app import MainWindow
          from src.tools.merge import MergeTool
          from src.tools.split import SplitTool
          from src.tools.rotate import RotateTool
          from src.tools.reorder import ReorderTool
          from src.tools.add_content import AddContentTool
          from src.tools.extract_text import ExtractTextTool
          from src.tools.compress import CompressTool
          from src.tools.watermark import WatermarkTool
          from src.tools.encrypt import EncryptTool
          from src.tools.convert import ConvertTool
          from src.tools.metadata import MetadataTool
          print('All imports OK')
          "

      - name: Smoke test — core PDF ops
        run: |
          python -c "
          import fitz
          doc = fitz.open()
          page = doc.new_page()
          page.insert_text((72, 72), 'Hello', fontsize=20)
          doc.save('test.pdf')
          doc.close()
          doc = fitz.open('test.pdf')
          assert 'Hello' in doc[0].get_text()
          doc.close()
          import os; os.remove('test.pdf')
          print('Core PDF ops OK')
          "
