name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libfontconfig1 libdbus-1-3
      - run: pip install -r requirements.txt mypy
      - run: mypy src/

  test:
    needs: [lint, typecheck]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libfontconfig1 libdbus-1-3
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -v

  package:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libglib2.0-0 libxkbcommon0 \
            libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libfontconfig1 libdbus-1-3
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pyinstaller PDFToolkit.spec
      - uses: actions/upload-artifact@v4
        with:
          name: PDFToolkit-linux-${{ github.sha }}
          path: dist/PDFToolkit/
